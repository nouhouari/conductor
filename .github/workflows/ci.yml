name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (root + workspaces)
        run: npm ci

      # ── conductor-e2e (framework) ─────────────────────────────────────────

      - name: Type-check & build (conductor-e2e)
        run: npm run build

      - name: Verify package contents (conductor-e2e)
        run: npm pack --dry-run

      - name: Dry-run example scenarios
        working-directory: example
        run: |
          npx cucumber-js --dry-run \
            --require-module ts-node/register \
            --require-module tsconfig-paths/register \
            --require '../src/hooks/index.ts' \
            --require 'step-definitions/**/*.ts' \
            --format summary \
            features/api/todo-api.feature \
            features/web/todo-crud.feature \
            features/desktop/todo-desktop.feature \
            features/cross-platform/web-to-mobile-sync.feature

      # ── conductor-mcp ────────────────────────────────────────────────────

      # Typecheck (`npm run typecheck -w mcp`) is intentionally OMITTED in CI.
      # The @modelcontextprotocol/sdk types.d.ts (~8200 lines of deep conditional
      # generics on registerTool/setRequestHandler) makes `tsc --noEmit` peak
      # above 6 GB, which OOMs even with --max-old-space-size=6144 on GitHub's
      # 7 GB hosted runners. esbuild already validates that the code parses
      # and resolves; the smoke tests below validate runtime behavior.
      # Devs can still run `npm run typecheck -w mcp` locally (recommend
      # NODE_OPTIONS=--max-old-space-size=8192 or higher).

      - name: Build (conductor-mcp)
        run: npm run build -w mcp

      - name: Verify package contents (conductor-mcp)
        run: npm pack --dry-run -w mcp

      - name: Smoke test (conductor-mcp)
        run: cd mcp && npm run test:smoke

      # ── drift check ──────────────────────────────────────────────────────
      # Verifies that the hooks path resolution used by init_project's cucumber.js
      # template still works.  The template resolves conductor-e2e's main entry
      # and derives the hooks path via .replace() — if the framework ever renames
      # or moves dist/src/hooks/index.js this step will fail loudly.

      - name: Drift check — conductor-e2e hooks path
        run: |
          node - <<'EOF'
          const path = require('path');
          let conductorMain;
          try {
            conductorMain = require.resolve('conductor-e2e');
          } catch (e) {
            // In CI the package is not published yet; resolve from the local build
            // artefact (dist/ is present after the build step above).
            conductorMain = require.resolve('./dist/src/index.js');
          }
          const hooksPath = conductorMain.replace(
            /[/\\]dist[/\\]src[/\\]index\.js$/,
            path.sep + path.join('dist', 'src', 'hooks', 'index.js')
          );
          const fs = require('fs');
          if (!fs.existsSync(hooksPath)) {
            console.error('hooks path does not exist:', hooksPath);
            console.error('conductor-e2e main was:', conductorMain);
            process.exit(1);
          }
          console.log('hooks resolved:', hooksPath);
          EOF
